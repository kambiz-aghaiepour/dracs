[project]
name = "dracs"
version = "1.0.0"
description = "Dell Rack & Asset Control System - CLI inventory tool for managing Dell bare-metal systems"
readme = "README.md"
requires-python = ">=3.12"
license = "GPL-3.0-or-later"
dependencies = [
    "requests>=2.31.0",
    "python-dotenv>=1.0.0",
    "tabulate>=0.9.0",
    "pysnmp>=7.1.8",
]

[project.scripts]
dracs = "dracs:main_cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dracs"]

[dependency-groups]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.21.0",
    "pytest-mock>=3.11.1",
    "black>=23.7.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_mode = "auto"
addopts = "-v --cov=dracs --cov-report=term-missing --cov-report=html --cov-fail-under=0"

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
version_variables = ["src/dracs/__init__.py:__version__"]
build_command = "uv build"
branch = "main"
upload_to_vcs_release = true
commit_message = "chore(release): {version}\n\n[skip ci]"

[tool.semantic_release.branches.main]
match = "main"
prerelease = false

[tool.semantic_release.changelog]
template_dir = "templates"
changelog_file = "CHANGELOG.md"
exclude_commit_patterns = []

[tool.semantic_release.commit_parser_options]
allowed_tags = ["feat", "fix", "docs", "style", "refactor", "perf", "test", "build", "ci", "chore", "revert"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
