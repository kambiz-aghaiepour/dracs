[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dracs"
version = "0.1.0"
description = "Dell Rack & Asset Control System - Dynamic CLI inventory tool for bare-metal systems"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Kambiz Aghaiepour" } # Based on the GitHub badge paths in your README
]
dependencies = [
    "python-dotenv",
    "requests",
    "pysnmp",
    "tabulate"
]

[project.scripts]
# This exposes the CLI command globally when the package is installed
dracs = "dracs:main_cli"

[tool.uv]
# Standardizing dev dependencies for your `uv sync --group dev` command
dev-dependencies = [
    "pytest",
    "pytest-asyncio", # Required for your @pytest.mark.asyncio decorators
    "black",
    "flake8",
    "python-semantic-release"
]

[tool.semantic_release]
# Tells python-semantic-release which files contain the version string to bump
version_variables = [
    "src/dracs/__init__.py:__version__"
]
version_toml = [
    "pyproject.toml:project.version"
]
# Disables building a distribution for PyPI, keeping the focus entirely on GitHub releases
build_command = "false"
commit_message = "chore(release): v{version} [skip ci]"

[tool.pytest.ini_options]
addopts = "-v"
testpaths = ["tests"]
# Ensures pytest can discover the dracs module inside the src folder
pythonpath = ["src"]
# Automatically handles async test functions without needing explicit event loop fixtures
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.black]
line-length = 88
target-version = ['py312']
