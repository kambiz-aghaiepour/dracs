name: Semantic Release

on:
  push:
    branches:
      - main

concurrency:
  group: semantic-release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Version and Build (Semantic Release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # This calculates the version, updates files, commits, tags, and runs `uv build` to populate the dist/ folder
        run: uv tool run --from python-semantic-release semantic-release version

      - name: Sync spec file version
        if: hashFiles('dist/*') != ''
        run: |
          NEW_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          sed -i "s/^Version:.*/Version:        ${NEW_VERSION}/" dracs.spec
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dracs.spec
          git diff --cached --quiet || git commit -m "chore: sync spec file version to ${NEW_VERSION} [skip ci]"
          git push

      - name: Publish package to PyPI
        # 👇 Only run if the dist directory exists and has files
        if: hashFiles('dist/*') != ''
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        # No password/token needed here! It uses the id-token permission to authenticate securely.
        # It will automatically find the .whl and .tar.gz files in the dist/ folder.

      - name: Create GitHub Release
        # 👇 Only run if the dist directory exists and has files
        if: hashFiles('dist/*') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Pushes the GitHub Release out to your repository
        run: uv tool run --from python-semantic-release semantic-release publish

      - name: Wait for PyPI source tarball to propagate to CDN
        if: hashFiles('dist/*') != ''
        run: |
          NEW_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Polling PyPI index for dracs ${NEW_VERSION}..."

          # Step 1: wait for the PyPI JSON index to know about this version and give us the exact tarball URL
          TARBALL_URL=""
          for i in $(seq 1 30); do
            BODY=$(curl -sf "https://pypi.org/pypi/dracs/${NEW_VERSION}/json" 2>/dev/null)
            if [ $? -eq 0 ] && [ -n "$BODY" ]; then
              TARBALL_URL=$(echo "$BODY" | python3 -c "
          import sys, json
          urls = json.load(sys.stdin).get('urls', [])
          print(next((u['url'] for u in urls if u.get('packagetype') == 'sdist'), ''))
          " 2>/dev/null)
              [ -n "$TARBALL_URL" ] && { echo "PyPI index ready (attempt $i): $TARBALL_URL"; break; }
            fi
            echo "Attempt $i/30: PyPI index not ready, retrying in 30s..."
            sleep 30
          done

          if [ -z "$TARBALL_URL" ]; then
            echo "::error::Failed to find source distribution on PyPI for dracs ${NEW_VERSION}"
            exit 1
          fi

          # Step 2: wait for the simple URL to be accessible on the CDN.
          # dracs.spec Source0 uses the /packages/source/d/dracs/ path (not the hashed URL
          # from the PyPI JSON API), and these two CDN paths propagate independently.
          # rpkg will 404 if only the hashed URL is ready but the simple URL is not.
          SIMPLE_URL="https://files.pythonhosted.org/packages/source/d/dracs/dracs-${NEW_VERSION}.tar.gz"
          echo "Polling CDN for simple-URL tarball availability: $SIMPLE_URL"
          for i in $(seq 1 30); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --head "$SIMPLE_URL")
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "302" ]; then
              echo "CDN ready (attempt $i, HTTP $HTTP)"; break
            fi
            echo "Attempt $i/30: CDN returned HTTP $HTTP, retrying in 30s..."
            [ "$i" = "30" ] && { echo "::error::Source tarball never became available on CDN"; exit 1; }
            sleep 30
          done

      - name: Trigger COPR rebuild
        if: hashFiles('dist/*') != ''
        env:
          COPR_API_LOGIN: ${{ secrets.COPR_API_LOGIN }}
          COPR_API_TOKEN: ${{ secrets.COPR_API_TOKEN }}
        run: |
          NEW_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Triggering COPR rebuild for dracs ${NEW_VERSION}..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -u "${COPR_API_LOGIN}:${COPR_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"ownername": "kambiz", "projectname": "dracs", "package_name": "dracs"}' \
            "https://copr.fedorainfracloud.org/api_3/package/build")
          HTTP=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "COPR API response (HTTP ${HTTP}):"
          echo "$BODY"
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
            echo "::error::COPR build trigger failed with HTTP ${HTTP}"
            exit 1
          fi
          BUILD_ID=$(echo "$BODY" | python3 -c "import sys, json; print(json.load(sys.stdin).get('id', 'unknown'))" 2>/dev/null || echo "unknown")
          echo "COPR build triggered: ID=${BUILD_ID}"
          echo "Track at: https://copr.fedorainfracloud.org/coprs/kambiz/dracs/builds/"

